[PHP]
expose_php = Off
file_uploads = On
memory_limit = 512M
upload_max_filesize = 128M
post_max_size = 128M
; Long-running tasks belong in CLI/cron, not web requests.
max_execution_time = 60
max_input_time = 60
max_input_vars = 3000

; Session hardening (requires HTTPS at the edge for cookie_secure to work).
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Strict"
session.use_strict_mode = 1

; Filesystem stat cache (big win for WordPress's many include paths).
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; OpenTelemetry: the SDK + WordPress auto-instrumentation are baked into the
; image at /opt/otel-php. The prepend only registers the autoloader; tracing
; activates when OTEL_PHP_AUTOLOAD_ENABLED=true is set (see README).
auto_prepend_file = /opt/otel-php/vendor/autoload.php

; OPcache + JIT (PHP 8.5)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
; In immutable images, set validate_timestamps=0 and call opcache_reset()
; on deploy for maximum throughput. Current setting tolerates live edits
; with a 60s staleness window.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 60
opcache.jit = tracing
opcache.jit_buffer_size = 128M
