name: Build and Push Docker Image

on:
  release:
    types: [published]
  push:
    branches: [master]
    paths:
      - Dockerfile
      - Dockerfile.alpine
      - custom-php.ini
      - apache-vhost.conf
      - .github/workflows/docker-build.yml

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian keeps the unsuffixed tags (and empty suffix preserves the
          # existing trivy-fixable/trivy-full SARIF categories).
          - dockerfile: Dockerfile
            suffix: ""
            tool-name: Trivy (Debian)
          - dockerfile: Dockerfile.alpine
            suffix: -alpine
            tool-name: Trivy (Alpine)
    name: build-scan-push (${{ matrix.dockerfile }})
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name == 'release'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.event_name == 'release'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # Suffixes every tag for the alpine variant (1.2.3-alpine,
          # latest-alpine, ...); no-op for the Debian build.
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      # Build into the local daemon so Trivy can scan before we push to GHCR.
      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: image-to-scan:latest
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}

      # Blocking scan: fail the build on HIGH/CRITICAL CVEs that have a fix
      # available upstream. These are actionable (just rebuild).
      - name: Scan image - block on fixable HIGH/CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: image-to-scan:latest
          format: sarif
          output: trivy-results-fixable.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # Reporting-only scan: capture the full picture (MEDIUM+ including
      # unfixed) and surface it in the Security tab without breaking the build.
      - name: Scan image - report full picture
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: image-to-scan:latest
          format: sarif
          output: trivy-results-full.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false
          exit-code: '0'

      # The Security tab's alert list only filters by tool name (categories
      # are not filterable there), so rename the SARIF tool per variant to
      # keep the two builds' alerts fully separated.
      - name: Rename SARIF tool per variant
        if: always()
        run: |
          set -eux
          for f in trivy-results-fixable.sarif trivy-results-full.sarif; do
            [ -f "$f" ] || continue
            jq --arg name "${{ matrix.tool-name }}" \
              '.runs[].tool.driver.name = $name' "$f" > "$f.tmp"
            mv "$f.tmp" "$f"
          done

      - name: Upload Trivy fixable findings to GitHub Security
        if: always() && hashFiles('trivy-results-fixable.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-fixable.sarif
          category: trivy-fixable${{ matrix.suffix }}

      - name: Upload Trivy full findings to GitHub Security
        if: always() && hashFiles('trivy-results-full.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-full.sarif
          category: trivy-full${{ matrix.suffix }}

      # Only release events push to GHCR. Master pushes scan-only.
      - name: Tag and push to GHCR
        if: github.event_name == 'release'
        run: |
          set -eux
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker tag image-to-scan:latest "$tag"
            docker push "$tag"
          done
