name: Build and Push Docker Image

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Blocking scan: fail the build on HIGH/CRITICAL CVEs that have a fix
      # available upstream. These are actionable (just rebuild).
      - name: Scan image - block on fixable HIGH/CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results-fixable.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # Reporting-only scan: capture the full picture (MEDIUM+ including
      # unfixed) and surface it in the Security tab without breaking the build.
      - name: Scan image - report full picture
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results-full.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false
          exit-code: '0'

      - name: Upload Trivy fixable findings to GitHub Security
        if: always() && hashFiles('trivy-results-fixable.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-fixable.sarif
          category: trivy-fixable

      - name: Upload Trivy full findings to GitHub Security
        if: always() && hashFiles('trivy-results-full.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-full.sarif
          category: trivy-full
