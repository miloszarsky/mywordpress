<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerAdmin webmaster@localhost

    RemoteIPHeader X-Forwarded-For
    RemoteIPTrustedProxy 10.0.0.0/8
    RemoteIPTrustedProxy 172.16.0.0/12
    RemoteIPTrustedProxy 192.168.0.0/16

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Cap request body at the Apache layer. Keep in sync with PHP post_max_size.
    LimitRequestBody 134217728

    # Security response headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    # Enable HSTS only after every subdomain is confirmed HTTPS-only:
    #Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    <Directory /var/www/html>
        # WordPress permalinks only need FileInfo. Avoid `All` (perf + safety).
        AllowOverride FileInfo Options=Indexes,MultiViews Limit
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Block direct access to sensitive WordPress / dotfile artifacts.
    <FilesMatch "^(wp-config\.php|wp-config-sample\.php|\.htaccess|\.htpasswd|readme\.html|license\.txt|xmlrpc\.php)$">
        Require all denied
    </FilesMatch>
    <DirectoryMatch "/\.(git|svn|hg|env|idea|vscode)(/|$)">
        Require all denied
    </DirectoryMatch>
    <FilesMatch "(^\.|~$|\.bak$|\.swp$|\.log$|\.sql$|\.sql\.gz$)">
        Require all denied
    </FilesMatch>

    # Defense in depth: never execute PHP from the uploads directory.
    <Directory /var/www/html/wp-content/uploads>
        <FilesMatch "\.ph(p[345]?|t|tml|ar)$">
            Require all denied
        </FilesMatch>
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.5-fpm.sock|fcgi://localhost"
    </FilesMatch>

</VirtualHost>
