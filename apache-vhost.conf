<VirtualHost *:80>
    # The directory where your WordPress files are located inside the container.
    DocumentRoot /var/www/html

    RemoteIPHeader X-Forwarded-For
    RemoteIPTrustedProxy 10.0.0.0/8
    RemoteIPTrustedProxy 172.16.0.0/12
    RemoteIPTrustedProxy 192.168.0.0/16

    # Standard logging configuration.
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Configuration for the DocumentRoot directory.
    <Directory /var/www/html>
        # Allow .htaccess files to override server settings, which is required for
        # WordPress features like custom permalinks.
        AllowOverride All

        # Grant access to all clients.
        Require all granted
    </Directory>

    # Route all requests for .php files to the PHP-FPM service.
    # This is more efficient than the traditional mod_php.
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
    </FilesMatch>

</VirtualHost>